<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Vocab Roulette 🎰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0a0a1a;
    --bg-card: #12122a;
    --neon-blue: #00d4ff;
    --neon-pink: #ff2d95;
    --neon-green: #39ff14;
    --neon-yellow: #ffe600;
    --neon-purple: #b026ff;
    --neon-orange: #ff6b00;
    --gold: #ffd700;
    --text: #e0e0e0;
    --text-dim: #888;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 45, 149, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(176, 38, 255, 0.06) 0%, transparent 50%);
    z-index: 0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 30px 0 20px;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 20px 0;
    flex-wrap: wrap;
  }

  .score-item {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 24px;
    text-align: center;
    min-width: 100px;
  }

  .score-item .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .score-item .value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
  }

  .score-item.streak .value { color: var(--neon-orange); }
  .score-item.correct .value { color: var(--neon-green); }
  .score-item.total .value { color: var(--neon-blue); }
  .score-item.lives .value { color: var(--neon-pink); }

  /* Lives display */
  .lives-display {
    font-size: 1.5rem !important;
    letter-spacing: 4px;
  }

  /* Wheel Section */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 20px 0;
    position: relative;
  }

  .wheel-wrapper {
    position: relative;
    width: 380px;
    height: 380px;
  }

  /* Pointer / Arrow */
  .wheel-pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 2.2rem;
    filter: drop-shadow(0 0 10px var(--neon-pink));
    animation: pointerGlow 1.5s ease-in-out infinite alternate;
  }

  @keyframes pointerGlow {
    0% { filter: drop-shadow(0 0 6px var(--neon-pink)); }
    100% { filter: drop-shadow(0 0 18px var(--neon-pink)) drop-shadow(0 0 30px rgba(255,45,149,0.4)); }
  }

  canvas#wheel {
    width: 380px;
    height: 380px;
    border-radius: 50%;
    box-shadow:
      0 0 30px rgba(0, 212, 255, 0.2),
      0 0 60px rgba(176, 38, 255, 0.1),
      inset 0 0 30px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: filter 0.3s;
  }

  canvas#wheel:hover:not(.spinning) {
    filter: brightness(1.1);
  }

  canvas#wheel.spinning {
    cursor: not-allowed;
  }

  .spin-btn {
    margin-top: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 14px 50px;
    border: 2px solid var(--neon-blue);
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(176,38,255,0.15));
    color: var(--neon-blue);
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .spin-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(0,212,255,0.3), rgba(176,38,255,0.3));
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
    transform: scale(1.05);
  }

  .spin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Quiz Card */
  .quiz-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 35px;
    margin: 25px 0;
    display: none;
    animation: cardIn 0.5s ease-out;
    position: relative;
    overflow: hidden;
  }

  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple));
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .quiz-card.show { display: block; }

  .word-display {
    text-align: center;
    margin-bottom: 25px;
  }

  .word-display .the-word {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--neon-blue);
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    margin-bottom: 6px;
  }

  .word-display .pos {
    font-size: 0.85rem;
    color: var(--neon-purple);
    font-style: italic;
  }

  .question-text {
    text-align: center;
    font-size: 1.05rem;
    color: var(--text-dim);
    margin-bottom: 22px;
  }

  .options {
    display: grid;
    gap: 12px;
  }

  .option-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    line-height: 1.4;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(0, 212, 255, 0.08);
    border-color: rgba(0, 212, 255, 0.3);
    transform: translateX(6px);
  }

  .option-btn .option-letter {
    display: inline-block;
    width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    font-weight: 700;
    font-size: 0.85rem;
    margin-right: 12px;
    vertical-align: middle;
    color: var(--neon-blue);
  }

  .option-btn.correct {
    background: rgba(57, 255, 20, 0.15) !important;
    border-color: var(--neon-green) !important;
    color: var(--neon-green);
  }

  .option-btn.correct .option-letter {
    background: var(--neon-green);
    color: #000;
  }

  .option-btn.wrong {
    background: rgba(255, 45, 149, 0.15) !important;
    border-color: var(--neon-pink) !important;
    color: var(--neon-pink);
  }

  .option-btn.wrong .option-letter {
    background: var(--neon-pink);
    color: #000;
  }

  /* Result feedback */
  .result-feedback {
    margin-top: 20px;
    padding: 18px;
    border-radius: 12px;
    display: none;
    animation: fadeUp 0.4s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-feedback.show { display: block; }

  .result-feedback.correct-feedback {
    background: rgba(57, 255, 20, 0.08);
    border: 1px solid rgba(57, 255, 20, 0.2);
  }

  .result-feedback.wrong-feedback {
    background: rgba(255, 45, 149, 0.08);
    border: 1px solid rgba(255, 45, 149, 0.2);
  }

  .result-feedback .feedback-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    margin-bottom: 8px;
  }

  .correct-feedback .feedback-title { color: var(--neon-green); }
  .wrong-feedback .feedback-title { color: var(--neon-pink); }

  .result-feedback .feedback-body {
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--text-dim);
  }

  .result-feedback .example-sentence {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--neon-purple);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    color: var(--text);
  }

  /* Game Over */
  .game-over {
    display: none;
    text-align: center;
    padding: 50px 30px;
    animation: cardIn 0.6s ease-out;
  }

  .game-over.show { display: block; }

  .game-over h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .game-over .final-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 30px 0;
    flex-wrap: wrap;
  }

  .game-over .stat {
    text-align: center;
  }

  .game-over .stat .num {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--neon-blue);
  }

  .game-over .stat .stat-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .game-over .words-learned {
    margin: 25px 0;
    text-align: left;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .game-over .words-learned h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--neon-purple);
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  .game-over .word-chip {
    display: inline-block;
    padding: 5px 14px;
    margin: 3px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
  }

  .word-chip.got-right {
    background: rgba(57, 255, 20, 0.12);
    border: 1px solid rgba(57, 255, 20, 0.3);
    color: var(--neon-green);
  }

  .word-chip.got-wrong {
    background: rgba(255, 45, 149, 0.12);
    border: 1px solid rgba(255, 45, 149, 0.3);
    color: var(--neon-pink);
  }

  .restart-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    padding: 14px 45px;
    border: 2px solid var(--neon-green);
    border-radius: 50px;
    background: rgba(57, 255, 20, 0.1);
    color: var(--neon-green);
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s;
    margin-top: 10px;
  }

  .restart-btn:hover {
    background: rgba(57, 255, 20, 0.25);
    box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
    transform: scale(1.05);
  }

  /* Chamber indicator (Russian roulette) */
  .chamber-indicator {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 15px 0 5px;
  }

  .chamber {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.03);
    transition: all 0.3s;
    position: relative;
  }

  .chamber.fired-safe {
    border-color: var(--neon-green);
    background: rgba(57, 255, 20, 0.2);
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
  }

  .chamber.fired-hit {
    border-color: var(--neon-pink);
    background: rgba(255, 45, 149, 0.3);
    box-shadow: 0 0 8px rgba(255, 45, 149, 0.3);
  }

  .chamber.current {
    border-color: var(--neon-yellow);
    box-shadow: 0 0 12px rgba(255, 230, 0, 0.4);
    animation: currentPulse 1s ease-in-out infinite;
  }

  @keyframes currentPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* Difficulty selector */
  .difficulty-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 5px;
  }

  .diff-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    padding: 6px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .diff-btn.active {
    border-color: var(--neon-blue);
    color: var(--neon-blue);
    background: rgba(0, 212, 255, 0.1);
  }

  .diff-btn:hover {
    border-color: var(--neon-blue);
    color: var(--neon-blue);
  }

  /* Screen shake for wrong answer */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
    20%, 40%, 60%, 80% { transform: translateX(4px); }
  }

  .shake { animation: shake 0.5s ease-in-out; }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  /* Responsive */
  @media (max-width: 500px) {
    header h1 { font-size: 1.5rem; }
    .wheel-wrapper { width: 300px; height: 300px; }
    canvas#wheel { width: 300px; height: 300px; }
    .quiz-card { padding: 22px; }
    .word-display .the-word { font-size: 1.5rem; }
    .scoreboard { gap: 12px; }
    .score-item { padding: 8px 16px; min-width: 75px; }
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
  <header>
    <h1>SAT VOCAB ROULETTE</h1>
    <p>Spin the wheel. Define the word. Survive the round. 🎯</p>
  </header>

  <div class="difficulty-bar">
    <button class="diff-btn active" data-diff="mixed" onclick="setDifficulty('mixed')">Mixed</button>
    <button class="diff-btn" data-diff="easy" onclick="setDifficulty('easy')">Common</button>
    <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">Advanced</button>
  </div>

  <div class="scoreboard">
    <div class="score-item correct">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-item streak">
      <div class="label">Streak</div>
      <div class="value" id="streak">0</div>
    </div>
    <div class="score-item total">
      <div class="label">Round</div>
      <div class="value" id="round">0</div>
    </div>
    <div class="score-item lives">
      <div class="label">Lives</div>
      <div class="value lives-display" id="lives">❤️❤️❤️❤️❤️❤️</div>
    </div>
  </div>

  <div class="chamber-indicator" id="chambers"></div>

  <div class="wheel-section">
    <div class="wheel-wrapper">
      <div class="wheel-pointer">▼</div>
      <canvas id="wheel" width="760" height="760"></canvas>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
  </div>

  <div class="quiz-card" id="quizCard">
    <div class="word-display">
      <div class="the-word" id="theWord"></div>
      <div class="pos" id="thePos"></div>
    </div>
    <div class="question-text">What does this word mean?</div>
    <div class="options" id="options"></div>
    <div class="result-feedback" id="feedback"></div>
  </div>

  <div class="game-over" id="gameOver">
    <h2>GAME OVER</h2>
    <div class="final-stats">
      <div class="stat">
        <div class="num" id="finalScore">0</div>
        <div class="stat-label">Points</div>
      </div>
      <div class="stat">
        <div class="num" id="finalCorrect">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat">
        <div class="num" id="finalBest">0</div>
        <div class="stat-label">Best Streak</div>
      </div>
      <div class="stat">
        <div class="num" id="finalAccuracy">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
    </div>
    <div class="words-learned" id="wordsLearned"></div>
    <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
// ─── SAT VOCABULARY BANK ───────────────────────────────────────
// Classic SAT reading & writing words from older College Board tests
const VOCAB_BANK = [
  // --- Common / Medium ---
  { word: "Aberration", pos: "noun", diff: "hard", def: "A departure from what is normal or expected", wrong: ["A type of optical lens", "A feeling of deep sadness", "A formal agreement between parties"], example: "The warm weather in January was an aberration from the typically freezing temperatures." },
  { word: "Abhor", pos: "verb", diff: "easy", def: "To regard with extreme disgust and hatred", wrong: ["To admire greatly", "To ignore completely", "To analyze carefully"], example: "She abhors cruelty to animals in any form." },
  { word: "Acquiesce", pos: "verb", diff: "hard", def: "To accept or comply without protest", wrong: ["To argue passionately against", "To acquire new possessions", "To question authority"], example: "Rather than continue the argument, he chose to acquiesce to her demands." },
  { word: "Alacrity", pos: "noun", diff: "hard", def: "Eager willingness or readiness", wrong: ["Deep sorrow and regret", "Careful and slow deliberation", "A type of chemical reaction"], example: "She accepted the job offer with alacrity, excited about the opportunity." },
  { word: "Ambiguous", pos: "adjective", diff: "easy", def: "Open to more than one interpretation; unclear", wrong: ["Extremely precise and detailed", "Filled with strong emotion", "Related to the environment"], example: "The contract's ambiguous language led to a dispute between the parties." },
  { word: "Ameliorate", pos: "verb", diff: "hard", def: "To make something bad or unsatisfactory better", wrong: ["To make worse or more severe", "To eliminate completely", "To analyze in great detail"], example: "The new policy was designed to ameliorate the effects of poverty." },
  { word: "Analogous", pos: "adjective", diff: "easy", def: "Comparable in certain respects; similar", wrong: ["Completely opposite in nature", "Impossible to understand", "Related to digital technology"], example: "The relationship between a CEO and a company is analogous to a captain and a ship." },
  { word: "Anomaly", pos: "noun", diff: "easy", def: "Something that deviates from the standard or norm", wrong: ["A mathematical equation", "A type of weather pattern", "A formal written agreement"], example: "The scientist noted an anomaly in the data that warranted further investigation." },
  { word: "Antipathy", pos: "noun", diff: "hard", def: "A deep-seated feeling of dislike or aversion", wrong: ["A strong feeling of sympathy", "A contagious disease", "A philosophical theory"], example: "There was a clear antipathy between the two rival politicians." },
  { word: "Apathy", pos: "noun", diff: "easy", def: "Lack of interest, enthusiasm, or concern", wrong: ["Intense passion for a cause", "A feeling of deep sympathy", "Nervous excitement"], example: "Voter apathy led to the lowest election turnout in decades." },
  { word: "Appease", pos: "verb", diff: "easy", def: "To pacify or calm by giving in to demands", wrong: ["To provoke or anger deliberately", "To evaluate critically", "To promote or advertise"], example: "The manager offered a refund to appease the frustrated customer." },
  { word: "Articulate", pos: "adjective", diff: "easy", def: "Expressing oneself clearly and effectively", wrong: ["Unable to speak or communicate", "Physically flexible", "Artificially created"], example: "The articulate speaker captivated the audience with her clear arguments." },
  { word: "Audacious", pos: "adjective", diff: "easy", def: "Showing a willingness to take bold risks", wrong: ["Extremely cautious and timid", "Related to hearing or sound", "Lacking any creativity"], example: "Her audacious plan to start a company at age 16 surprised everyone." },
  { word: "Auspicious", pos: "adjective", diff: "hard", def: "Indicating a positive and successful future", wrong: ["Causing suspicion or distrust", "Extremely unlucky", "Related to astronomy"], example: "The sunny weather on graduation day seemed auspicious for the graduates' futures." },
  { word: "Bolster", pos: "verb", diff: "easy", def: "To support, strengthen, or reinforce", wrong: ["To weaken or undermine", "To decorate elaborately", "To move quickly"], example: "New evidence bolstered the prosecution's case against the defendant." },
  { word: "Brevity", pos: "noun", diff: "easy", def: "Concise and exact use of words; shortness of time", wrong: ["Extreme length and detail", "A feeling of bravery", "A type of musical composition"], example: "The professor was known for the brevity of her lectures—always under 30 minutes." },
  { word: "Candor", pos: "noun", diff: "easy", def: "The quality of being open, honest, and sincere", wrong: ["The ability to deceive skillfully", "A sweet-smelling fragrance", "A type of political campaign"], example: "She appreciated his candor even though the truth was difficult to hear." },
  { word: "Capricious", pos: "adjective", diff: "hard", def: "Given to sudden and unaccountable changes of mood", wrong: ["Extremely generous and kind", "Rigidly consistent in behavior", "Related to goats or livestock"], example: "The capricious weather made it impossible to plan outdoor events." },
  { word: "Cogent", pos: "adjective", diff: "hard", def: "Clear, logical, and convincing", wrong: ["Confusing and contradictory", "Physically powerful", "Extremely old-fashioned"], example: "The lawyer presented a cogent argument that swayed the jury." },
  { word: "Complacent", pos: "adjective", diff: "easy", def: "Smugly self-satisfied and uncritical of oneself", wrong: ["Deeply worried and anxious", "Eager to make improvements", "Showing great compassion"], example: "The team became complacent after their winning streak and stopped practicing hard." },

// ─── GAME STATE ────────────────────────────────────────────────
let state = {
  score: 0,
  streak: 0,
  bestStreak: 0,
  round: 0,
  lives: 6,
  maxLives: 6,
  totalCorrect: 0,
  totalAnswered: 0,
  difficulty: 'mixed',
  currentWord: null,
  spinning: false,
  usedWords: [],
  wordResults: [], // { word, correct }
  wheelWords: [],
  angle: 0,
};

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');

// ─── INITIALIZE ────────────────────────────────────────────────
function init() {
  populateWheel();
  drawWheel();
  updateUI();
  renderChambers();
}

function setDifficulty(diff) {
  state.difficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === diff));
  populateWheel();
  drawWheel();
}

function getFilteredBank() {
  if (state.difficulty === 'mixed') return VOCAB_BANK;
  return VOCAB_BANK.filter(w => w.diff === state.difficulty);
}

function populateWheel() {
  const bank = getFilteredBank().filter(w => !state.usedWords.includes(w.word));
  const shuffled = bank.sort(() => Math.random() - 0.5);
  state.wheelWords = shuffled.slice(0, 10);
  // If we're running low, reset used words
  if (state.wheelWords.length < 10) {
    state.usedWords = [];
    const fullBank = getFilteredBank().sort(() => Math.random() - 0.5);
    state.wheelWords = fullBank.slice(0, 10);
  }
}

// ─── DRAW WHEEL ────────────────────────────────────────────────
function drawWheel() {
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(cx, cy) - 10;
  const segments = state.wheelWords.length;
  const arc = (2 * Math.PI) / segments;

  ctx.clearRect(0, 0, w, h);

  // Draw segments
  for (let i = 0; i < segments; i++) {
    const startAngle = state.angle + i * arc;
    const endAngle = startAngle + arc;

    // Segment fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();

    // Segment border
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px Inter, sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    const word = state.wheelWords[i].word;
    ctx.fillText(word.length > 12 ? word.slice(0, 11) + '…' : word, r - 20, 8);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
  ctx.fillStyle = '#0a0a1a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,212,255,0.5)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center text
  ctx.fillStyle = '#00d4ff';
  ctx.font = 'bold 22px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SAT', cx, cy);
}

// ─── SPIN ──────────────────────────────────────────────────────
function spinWheel() {
  if (state.spinning) return;
  state.spinning = true;
  document.getElementById('spinBtn').disabled = true;
  canvas.classList.add('spinning');

  // Hide previous quiz
  document.getElementById('quizCard').classList.remove('show');
  document.getElementById('feedback').classList.remove('show');

  const segments = state.wheelWords.length;
  const arc = (2 * Math.PI) / segments;

  // Random spin: 5-8 full rotations + random offset
  const spinAmount = (5 + Math.random() * 3) * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 4000 + Math.random() * 1000;
  const startAngle = state.angle;
  const startTime = performance.now();

  // Play tick sound effect via AudioContext
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function tick() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800 + Math.random() * 400;
    gain.gain.value = 0.04;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.03);
  }

  let lastSegment = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);

    // Easing: cubic ease-out
    const eased = 1 - Math.pow(1 - progress, 3);
    state.angle = startAngle + spinAmount * eased;

    drawWheel();

    // Tick sound on segment change
    const pointerAngle = (2 * Math.PI - (state.angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const currentSeg = Math.floor(pointerAngle / arc) % segments;
    if (currentSeg !== lastSegment) {
      tick();
      lastSegment = currentSeg;
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Determine winner
      const finalAngle = (2 * Math.PI - (state.angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      const winIndex = Math.floor(finalAngle / arc) % segments;
      state.currentWord = state.wheelWords[winIndex];
      state.spinning = false;
      canvas.classList.remove('spinning');
      state.round++;

      // Play landing sound
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = 523.25;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);

      setTimeout(() => showQuiz(), 400);
    }
  }

  requestAnimationFrame(animate);
}

// ─── QUIZ ──────────────────────────────────────────────────────
function showQuiz() {
  const word = state.currentWord;
  document.getElementById('theWord').textContent = word.word;
  document.getElementById('thePos').textContent = `(${word.pos})`;

  // Build options: 1 correct + 3 wrong (shuffled)
  const options = [
    { text: word.def, correct: true },
    ...word.wrong.map(w => ({ text: w, correct: false }))
  ].sort(() => Math.random() - 0.5);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.text}`;
    btn.onclick = () => handleAnswer(opt.correct, btn, optionsEl, word);
    optionsEl.appendChild(btn);
  });

  document.getElementById('feedback').classList.remove('show');
  document.getElementById('quizCard').classList.add('show');
  updateUI();
}

function handleAnswer(isCorrect, clickedBtn, optionsEl, word) {
  // Disable all options
  optionsEl.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    b.style.cursor = 'default';
  });

  // Highlight correct/wrong
  optionsEl.querySelectorAll('.option-btn').forEach(b => {
    if (b.innerHTML.includes(word.def)) b.classList.add('correct');
  });

  state.totalAnswered++;
  state.usedWords.push(word.word);

  const feedbackEl = document.getElementById('feedback');

  if (isCorrect) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const bonus = state.streak >= 3 ? state.streak * 10 : 10;
    state.score += bonus;
    state.totalCorrect++;
    state.wordResults.push({ word: word.word, correct: true });

    feedbackEl.className = 'result-feedback correct-feedback show';
    feedbackEl.innerHTML = `
      <div class="feedback-title">✅ CORRECT! +${bonus} pts${state.streak >= 3 ? ' (streak bonus!)' : ''}</div>
      <div class="feedback-body">
        <strong>${word.word}</strong>: ${word.def}
        <div class="example-sentence">"${word.example}"</div>
      </div>
    `;

    // Mini confetti burst
    launchConfetti();
  } else {
    clickedBtn.classList.add('wrong');
    state.streak = 0;
    state.lives--;
    state.wordResults.push({ word: word.word, correct: false });

    feedbackEl.className = 'result-feedback wrong-feedback show';
    feedbackEl.innerHTML = `
      <div class="feedback-title">💀 WRONG! You lost a life!</div>
      <div class="feedback-body">
        <strong>${word.word}</strong> means: <em>${word.def}</em>
        <div class="example-sentence">"${word.example}"</div>
      </div>
    `;

    // Screen shake
    document.querySelector('.quiz-card').classList.add('shake');
    setTimeout(() => document.querySelector('.quiz-card').classList.remove('shake'), 500);
  }

  updateUI();
  renderChambers();

  // Check game over
  if (state.lives <= 0) {
    setTimeout(() => showGameOver(), 1800);
  } else {
    // Re-enable spin
    setTimeout(() => {
      document.getElementById('spinBtn').disabled = false;
      populateWheel();
      drawWheel();
    }, 1200);
  }
}

// ─── UI UPDATES ────────────────────────────────────────────────
function updateUI() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('round').textContent = state.round;
  const hearts = '❤️'.repeat(state.lives) + '🖤'.repeat(state.maxLives - state.lives);
  document.getElementById('lives').textContent = hearts;
}

function renderChambers() {
  const el = document.getElementById('chambers');
  el.innerHTML = '';
  for (let i = 0; i < state.maxLives; i++) {
    const c = document.createElement('div');
    c.className = 'chamber';
    if (i < state.wordResults.length) {
      c.classList.add(state.wordResults[i].correct ? 'fired-safe' : 'fired-hit');
    } else if (i === state.wordResults.length) {
      c.classList.add('current');
    }
    el.appendChild(c);
  }
}

// ─── GAME OVER ─────────────────────────────────────────────────
function showGameOver() {
  document.getElementById('quizCard').classList.remove('show');
  document.getElementById('spinBtn').style.display = 'none';

  const go = document.getElementById('gameOver');
  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('finalCorrect').textContent = state.totalCorrect;
  document.getElementById('finalBest').textContent = state.bestStreak;
  const acc = state.totalAnswered > 0 ? Math.round((state.totalCorrect / state.totalAnswered) * 100) : 0;
  document.getElementById('finalAccuracy').textContent = acc + '%';

  // Words learned summary
  const wl = document.getElementById('wordsLearned');
  wl.innerHTML = '<h3>📚 Words Encountered</h3>';
  state.wordResults.forEach(wr => {
    const chip = document.createElement('span');
    chip.className = `word-chip ${wr.correct ? 'got-right' : 'got-wrong'}`;
    chip.textContent = wr.word;
    wl.appendChild(chip);
  });

  go.classList.add('show');
}

function restartGame() {
  state = {
    score: 0, streak: 0, bestStreak: 0, round: 0,
    lives: 6, maxLives: 6, totalCorrect: 0, totalAnswered: 0,
    difficulty: state.difficulty, currentWord: null, spinning: false,
    usedWords: [], wordResults: [], wheelWords: [], angle: 0,
  };
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('quizCard').classList.remove('show');
  document.getElementById('spinBtn').style.display = '';
  document.getElementById('spinBtn').disabled = false;
  populateWheel();
  drawWheel();
  updateUI();
  renderChambers();
}

// ─── CONFETTI ──────────────────────────────────────────────────
const confettiCanvas = document.getElementById('confetti');
const cCtx = confettiCanvas.getContext('2d');
let confettiPieces = [];

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti() {
  const colors = ['#ff2d95', '#00d4ff', '#39ff14', '#ffe600', '#b026ff', '#ff6b00'];
  for (let i = 0; i < 60; i++) {
    confettiPieces.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 12,
      vy: -Math.random() * 14 - 4,
      size: Math.random() * 8 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      life: 1,
    });
  }
}

function animateConfetti() {
  cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiPieces = confettiPieces.filter(p => p.life > 0);
  confettiPieces.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.rotation += p.rotSpeed;
    p.life -= 0.012;

    cCtx.save();
    cCtx.translate(p.x, p.y);
    cCtx.rotate((p.rotation * Math.PI) / 180);
    cCtx.globalAlpha = p.life;
    cCtx.fillStyle = p.color;
    cCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    cCtx.restore();
  });
  requestAnimationFrame(animateConfetti);
}
animateConfetti();

// ─── START ─────────────────────────────────────────────────────
init();
</script>
